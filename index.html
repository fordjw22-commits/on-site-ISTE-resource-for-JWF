<title>ISTE 2026 — Floor Contacts</title>
<style>
  :root{
    --navy:#10355c; --navy-700:#0b2842; --red:#d6202e; --green:#1f8a5b;
    --amber:#c9760a; --grey:#7c8794; --ink:#16202b; --muted:#5c6b7a;
    --line:#e4e8ee; --bg:#f3f2ec; --card:#ffffff; --chip:#eef1f6;
    --warn-bg:#fff4e3; --warn-line:#e0a64b; --excl-bg:#fde7e7; --excl-line:#d6202e;
    --shadow:0 1px 2px rgba(16,53,92,.06),0 2px 8px rgba(16,53,92,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.4;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:20;background:var(--navy);
    color:#fff;padding:10px 12px calc(10px) 12px;box-shadow:0 2px 10px rgba(11,40,66,.25);
    padding-top:calc(10px + env(safe-area-inset-top));
  }
  .titlebar{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px}
  .titlebar h1{font-size:17px;font-weight:700;margin:0;letter-spacing:.2px}
  .titlebar .sub{font-size:11px;color:#aebfd4;font-weight:500;white-space:nowrap}
  .searchrow{display:flex;gap:8px;align-items:center}
  #search{
    flex:1;font-size:16px;padding:11px 12px;border:0;border-radius:10px;
    background:#fff;color:var(--ink);outline:2px solid transparent;
  }
  #search:focus{outline:2px solid #6ea0d6}
  #clear{background:#1c4a7a;border:0;color:#cfe0f2;font-size:16px;border-radius:10px;
    padding:0 13px;height:42px;cursor:pointer}
  .sortrow{display:flex;gap:8px;align-items:center;margin-top:8px}
  .seg{display:inline-flex;background:#0b2842;border-radius:9px;padding:3px}
  .seg button{background:transparent;border:0;color:#9fb4cd;font-size:13px;font-weight:600;
    padding:6px 12px;border-radius:7px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--navy)}
  .seg .lbl{color:#8ba0ba;font-size:12px;align-self:center;margin-right:2px}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:9px 12px;background:#0e2f52;
    position:sticky;top:0;z-index:19;-webkit-overflow-scrolling:touch}
  .chip{flex:0 0 auto;background:#163e66;color:#cdddef;border:1px solid #1f4d7d;
    font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .chip .n{opacity:.65;font-weight:600;margin-left:5px}
  .chip.on{background:#fff;color:var(--navy);border-color:#fff}
  /* ---------- list ---------- */
  main{padding:10px 10px 128px 10px;max-width:720px;margin:0 auto}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:15px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
    margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden}
  .row{display:flex;align-items:center;gap:11px;padding:12px 12px;cursor:pointer}
  .booth{flex:0 0 auto;min-width:58px;text-align:center;background:#f4f7fb;border:1.5px solid #c7d6e6;
    color:var(--navy);border-radius:9px;padding:7px 6px;font-weight:800;font-size:16px;
    font-variant-numeric:tabular-nums;line-height:1}
  .booth small{display:block;font-size:8.5px;font-weight:700;letter-spacing:.7px;color:#8aa0bb;margin-bottom:2px}
  .booth.none{background:#f3f3f3;border-color:#dcdcdc;color:#9aa3ad}
  .booth.none b{font-size:11px;font-weight:700}
  .info{flex:1;min-width:0}
  .cname{font-weight:700;font-size:15.5px;line-height:1.2;display:flex;align-items:center;gap:6px}
  .cname .star{color:#1f8a5b;font-size:13px}
  .meta{display:flex;align-items:center;gap:7px;margin-top:4px;flex-wrap:wrap}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
    padding:2px 7px;border-radius:5px;color:#fff}
  .b-client{background:var(--navy)} .b-prospect{background:var(--green)}
  .b-account{background:var(--amber)} .b-exhibitor{background:#9aa6b2}
  .hq{font-size:12px;color:var(--muted);font-weight:600}
  .cc{font-size:12px;color:var(--navy);font-weight:700;background:#eaf1f9;border-radius:999px;padding:2px 8px}
  .cc.zero{color:#9aa3ad;background:#f1f1f1}
  .mtg{font-size:11px;font-weight:800;color:#fff;background:var(--navy);border-radius:5px;padding:2px 7px;letter-spacing:.2px;white-space:nowrap}
  .mtgbox{background:#e9f0fa;border:1px solid #c3d6ee;border-left:4px solid var(--navy);border-radius:8px;padding:9px 11px;margin:11px 0 2px}
  .mtgbox .mh{font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--navy);text-transform:uppercase;margin-bottom:5px}
  .mtgrow{font-size:13px;color:#243b54;line-height:1.4;padding:4px 0;border-top:1px dashed #cfdcef}
  .mtgrow.first{border-top:0}
  .mtgrow b{color:var(--navy)}
  .mtgrow .loc{display:block;color:#41607f}
  .mtgrow .g{color:var(--muted);font-size:12px}
  .chev{flex:0 0 auto;color:#b6c1cd;font-size:13px;transition:transform .18s}
  .card.open .chev{transform:rotate(90deg)}
  /* ---------- expanded ---------- */
  .body{display:none;border-top:1px solid var(--line);padding:4px 12px 13px}
  .card.open .body{display:block}
  .tnote{font-size:12.5px;color:#6a574a;background:#fbf6ee;border:1px solid #ecdcc3;
    border-radius:8px;padding:7px 10px;margin:11px 0 4px}
  .tnote b{color:#8a6d4f}
  .sectlbl{font-size:10.5px;font-weight:800;letter-spacing:.6px;color:#9aa6b2;
    text-transform:uppercase;margin:13px 0 6px}
  .contact{padding:9px 0;border-bottom:1px dashed #eceff3}
  .contact:last-child{border-bottom:0}
  .cn{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .ct{font-size:13px;color:var(--muted);margin-top:1px}
  .pill{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
    padding:2px 6px;border-radius:5px}
  .pill-target{background:#e7f5ee;color:#1f8a5b}
  .pill-you{background:#eef1f6;color:var(--navy)}
  .emailrow{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
  .emaillink{font-size:13.5px;color:#1c5fa8;text-decoration:none;font-weight:600;word-break:break-all}
  .mini{font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;
    border-radius:7px;padding:5px 10px;cursor:pointer;color:var(--navy)}
  .mini:active{background:#eef1f6}
  .mini.del{color:var(--red);border-color:#f0c9cc}
  .flag{font-size:12px;border-radius:7px;padding:6px 9px;margin-top:6px;line-height:1.35}
  .flag.warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:#8a5a12}
  .flag.excl{background:var(--excl-bg);border:1px solid var(--excl-line);color:#a01620;font-weight:600}
  .addbox{margin-top:10px}
  .addbox input{display:block;width:100%;font-size:16px;padding:9px 10px;margin-bottom:7px;
    border:1px solid var(--line);border-radius:8px;background:#fff}
  .addgrid{display:flex;gap:7px}
  .addgrid .mini{flex:1;text-align:center;padding:9px 10px}
  .addgrid .save{background:var(--navy);color:#fff;border-color:var(--navy)}
  .actbar{display:flex;gap:8px;margin-top:12px}
  .actbar .mini{flex:1;text-align:center;padding:10px}
  .pnote{width:100%;font-size:15px;padding:9px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fffdf7;resize:vertical;min-height:120px;margin-top:6px}
  /* ---------- footer ---------- */
  .toolbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;
    border-top:1px solid var(--line);padding:8px 12px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(16,53,92,.08)}
  .savebar{display:flex;justify-content:space-between;align-items:center;gap:10px;
    font-size:12px;font-weight:600;margin-bottom:7px;line-height:1.25}
  #saveState{color:var(--green);white-space:nowrap}
  #saveState.saving{color:var(--muted)}
  #saveState.off{color:var(--muted)}
  #backupState{color:var(--muted);text-align:right}
  #backupState.due{color:var(--amber)}
  .toolrow{display:flex;gap:8px}
  .toolrow button{flex:1;font-size:13px;font-weight:700;border:1px solid var(--line);
    background:#fff;color:var(--navy);border-radius:9px;padding:11px 6px;cursor:pointer}
  .toolrow button.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  #expBackup.due{border-color:var(--warn-line);background:#fff8ec;color:#8a5a12}
  .toast{position:fixed;left:50%;bottom:112px;transform:translateX(-50%) translateY(20px);
    background:#16202b;color:#fff;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const STORE_KEY = 'iste2026_floor_v1';

/* ---- persistence (works in downloaded file; falls back to memory in preview) ---- */
let overrides = {};
let storageOK = true;
try{ overrides = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
catch(e){ overrides = {}; storageOK = false; }
function ov(key){ return overrides[key] || (overrides[key] = {met:false, note:'', added:[]}); }

const META_KEY = 'iste2026_floor_meta_v1';
let meta = { lastBackup:0, lastChange:0 };
try{ meta = Object.assign(meta, JSON.parse(localStorage.getItem(META_KEY) || '{}')); }catch(e){}
function saveMeta(){ try{ if(storageOK) localStorage.setItem(META_KEY, JSON.stringify(meta)); }catch(e){} }

let savedTimer;
function flashSaved(){
  const s = document.getElementById('saveState'); if(!s) return;
  if(!storageOK){ s.textContent='Preview only — saving is off here'; s.className='off'; return; }
  s.textContent='Saving…'; s.className='saving';
  clearTimeout(savedTimer);
  savedTimer = setTimeout(()=>{ s.textContent='✓ Saved on this phone'; s.className=''; }, 350);
}
function fmtTime(t){ if(!t) return 'never';
  return new Date(t).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function updateBackupState(){
  const b = document.getElementById('backupState'); const eb = document.getElementById('expBackup');
  if(!b) return;
  const due = storageOK && meta.lastChange > meta.lastBackup;
  if(!storageOK){ b.textContent=''; b.className=''; if(eb) eb.classList.remove('due'); return; }
  b.textContent = due ? '⚠ New notes — back up' : ('Backed up: ' + fmtTime(meta.lastBackup));
  b.classList.toggle('due', due);
  if(eb) eb.classList.toggle('due', due);
}

function save(){
  try{ if(storageOK) localStorage.setItem(STORE_KEY, JSON.stringify(overrides)); }
  catch(e){ storageOK = false; }
  meta.lastChange = Date.now(); saveMeta();
  flashSaved(); updateBackupState();
}

/* ---- state ---- */
let state = { q:'', sort:'booth', filter:'targets' };
const TARGET_CATS = new Set(['client','prospect','account']);

const FILTERS = [
  {id:'meetings', label:'📅 My meetings', test:c=>!!(c.meetings && c.meetings.length)},
  {id:'targets',  label:'My targets', test:c=>TARGET_CATS.has(c.category)},
  {id:'contacts', label:'Has contacts', test:c=>totalContacts(c)>0},
  {id:'nocontacts', label:'No contacts', test:c=>TARGET_CATS.has(c.category) && totalContacts(c)===0},
  {id:'noted',    label:'✎ Noted',    test:c=>{const n=ov(c.key).note; return !!(n && n.trim());}},
  {id:'all',      label:'Full floor', test:()=>true},
];

function totalContacts(c){ return c.contacts.length + ov(c.key).added.length; }
function boothNum(c){ const n = parseInt((c.booth||'').replace(/\D/g,''),10); return isNaN(n)?Infinity:n; }

/* ---- render ---- */
const listEl = document.getElementById('list');
const chipsEl = document.getElementById('chips');
const hdrCount = document.getElementById('hdrcount');

function buildChips(){
  chipsEl.innerHTML = '';
  FILTERS.forEach(f=>{
    const count = DATA.filter(f.test).length;
    const b = document.createElement('button');
    b.className = 'chip' + (state.filter===f.id?' on':'');
    b.innerHTML = f.label + ' <span class="n">'+count+'</span>';
    b.onclick = ()=>{ state.filter=f.id; render(); };
    chipsEl.appendChild(b);
  });
}

function visible(){
  const f = FILTERS.find(x=>x.id===state.filter);
  let arr = DATA.filter(f.test);
  if(state.q){
    const q = state.q.toLowerCase();
    arr = arr.filter(c => c.name.toLowerCase().includes(q) || (c.booth||'').toLowerCase().includes(q));
  }
  arr.sort((a,b)=> state.sort==='az'
    ? a.name.toLowerCase().localeCompare(b.name.toLowerCase())
    : (boothNum(a)-boothNum(b)) || a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
  return arr;
}

function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function contactHTML(x, ci, key, added){
  const flag = x.flag||'';
  const isExcl = /^exclude/i.test(flag);
  let h = '<div class="contact" data-ci="'+ci+'">';
  h += '<div class="cn">'+esc(x.name||'(no name)');
  if(x.isTarget) h += '<span class="pill pill-target">🎯 Target</span>';
  if(added) h += '<span class="pill pill-you">＋ You</span>';
  h += '</div>';
  if(x.title) h += '<div class="ct">'+esc(x.title)+'</div>';
  if(x.email){
    h += '<div class="emailrow"><a class="emaillink" href="mailto:'+esc(x.email)+'">'+esc(x.email)+'</a>';
    h += '<button class="mini" data-copy="'+esc(x.email)+'">Copy</button></div>';
  }
  if(flag) h += '<div class="flag '+(isExcl?'excl':'warn')+'">'+(isExcl?'⚠︎ ':'ⓘ ')+esc(flag)+'</div>';
  if(added) h += '<div class="emailrow"><button class="mini del" data-del="'+ci+'">Remove</button></div>';
  h += '</div>';
  return h;
}

function cardHTML(c){
  const o = ov(c.key);
  const n = totalContacts(c);
  const boothHTML = c.booth
    ? '<div class="booth"><small>BOOTH</small>'+esc(c.booth)+'</div>'
    : '<div class="booth none"><b>No<br>booth</b></div>';
  const badgeLbl = {client:'Client',prospect:'Prospect',account:'Account',exhibitor:'Exhibitor'}[c.category];

  let h = '<div class="card" data-key="'+esc(c.key)+'">';
  h += '<div class="row js-toggle">'+boothHTML+'<div class="info">';
  h += '<div class="cname">'+esc(c.name)+'</div>';
  h += '<div class="meta"><span class="badge b-'+c.category+'">'+badgeLbl+'</span>';
  if(c.hq) h += '<span class="hq">'+esc(c.hq)+'</span>';
  h += '<span class="cc'+(n?'':' zero')+'">'+(n? n+(n===1?' contact':' contacts'):'no contacts')+'</span>';
  if(c.meetings && c.meetings.length){
    const m0=c.meetings[0];
    const lbl = c.meetings.length>1 ? ('📅 '+c.meetings.length+' meetings') : ('📅 '+m0.day+' '+m0.time.replace(' ET',''));
    h += '<span class="mtg">'+lbl+'</span>';
  }
  h += '</div></div><div class="chev">▶</div></div>';

  // body
  h += '<div class="body">';
  if(c.meetings && c.meetings.length){
    h += '<div class="mtgbox"><div class="mh">📅 Your meeting'+(c.meetings.length>1?'s':'')+'</div>';
    c.meetings.forEach((m,i)=>{
      h += '<div class="mtgrow'+(i===0?' first':'')+'"><b>'+esc(m.day)+' · '+esc(m.time)+'</b>';
      h += '<span class="loc">'+esc(m.location)+'</span>';
      if(m.guests && m.guests.length) h += '<span class="g">+ '+esc(m.guests.join(', '))+'</span>';
      h += '</div>';
    });
    h += '</div>';
  }
  if(c.trackerNotes) h += '<div class="tnote"><b>Note:</b> '+esc(c.trackerNotes)+'</div>';
  if(c.contacts.length || o.added.length){
    h += '<div class="sectlbl">Contacts</div>';
    c.contacts.forEach((x,i)=> h += contactHTML(x,i,c.key,false));
    o.added.forEach((x,i)=> h += contactHTML(x,'a'+i,c.key,true));
  } else {
    h += '<div class="sectlbl">Contacts</div><div class="ct" style="padding:4px 0 2px">None on file yet — add anyone you meet below.</div>';
  }
  // my show notes (above add-contact)
  h += '<div class="sectlbl">My show notes</div>';
  h += '<textarea class="pnote js-note" placeholder="Notes for Salesforce (e.g. talked to Jane, send Q3 proposal)…">'+esc(o.note)+'</textarea>';
  // add form (name + title only)
  h += '<div class="sectlbl">Add a contact</div><div class="addbox">';
  h += '<input class="f-name" placeholder="Name" autocomplete="off">';
  h += '<input class="f-title" placeholder="Title" autocomplete="off">';
  h += '<div class="addgrid"><button class="mini save js-add">Save contact</button></div></div>';
  h += '</div></div>';
  return h;
}

function render(){
  buildChips();
  const arr = visible();
  hdrCount.textContent = arr.length + ' shown · ' + DATA.length + ' total';
  if(!arr.length){
    listEl.innerHTML = '<div class="empty">No matches.<br>Try a different name or booth number, or switch the filter above.</div>';
    return;
  }
  listEl.innerHTML = arr.map(cardHTML).join('');
}

/* ---- interactions (event delegation) ---- */
function cardOf(el){ return el.closest('.card'); }
function dataOf(card){ return DATA.find(c=>c.key===card.dataset.key); }

listEl.addEventListener('click', e=>{
  const card = cardOf(e.target); if(!card) return;
  const c = dataOf(card); const o = ov(c.key);

  if(e.target.closest('.js-toggle')){
    listEl.querySelectorAll('.card.open').forEach(o=>{ if(o!==card) o.classList.remove('open'); });
    card.classList.toggle('open');
    return;
  }

  const copyBtn = e.target.closest('[data-copy]');
  if(copyBtn){ copyText(copyBtn.getAttribute('data-copy')); return; }

  const del = e.target.closest('[data-del]');
  if(del){
    const i = parseInt(del.getAttribute('data-del'),10);
    o.added.splice(i,1); save();
    refreshCard(card,c); toast('Contact removed'); return;
  }

  if(e.target.closest('.js-add')){
    const name = card.querySelector('.f-name').value.trim();
    const title = card.querySelector('.f-title').value.trim();
    if(!name){ toast('Add a name first'); return; }
    o.added.push({name,title,email:''}); save();
    refreshCard(card,c); toast('Contact added'); return;
  }
});

listEl.addEventListener('input', e=>{
  if(e.target.classList.contains('js-note')){
    const card = cardOf(e.target); const c = dataOf(card);
    ov(c.key).note = e.target.value; save();
  }
});

function refreshCard(card,c){
  card.outerHTML = cardHTML(c);
  const fresh = document.querySelector('.card[data-key="'+cssEsc(c.key)+'"]');
  fresh.classList.add('open');
}
function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g,'\\"'); }

function copyText(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('Copied'),()=>toast(t)); }
  else { const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy');toast('Copied');}catch(e){toast(t);} ta.remove(); }
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600);
}

/* ---- controls ---- */
const search = document.getElementById('search');
search.addEventListener('input', ()=>{ state.q=search.value.trim(); render(); });
document.getElementById('clear').onclick = ()=>{ search.value=''; state.q=''; render(); search.focus(); };
document.getElementById('sortBooth').onclick = function(){ state.sort='booth'; this.classList.add('on'); document.getElementById('sortAZ').classList.remove('on'); render(); };
document.getElementById('sortAZ').onclick = function(){ state.sort='az'; this.classList.add('on'); document.getElementById('sortBooth').classList.remove('on'); render(); };

/* ---- export / import ---- */
function download(name, text, type){
  const blob = new Blob([text], {type}); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a);
  a.click(); a.remove(); URL.revokeObjectURL(url);
}
document.getElementById('expBackup').onclick = ()=>{
  download('iste2026_floor_backup.json', JSON.stringify(overrides,null,2), 'application/json');
  meta.lastBackup = Date.now(); saveMeta(); updateBackupState();
  toast('Backup downloaded — keep it safe');
};
document.getElementById('expSF').onclick = ()=>{
  const rows = [['Company','Booth','Category','My Notes','Contacts I Added']];
  DATA.forEach(c=>{
    const o = overrides[c.key]; if(!o) return;
    const hasData = (o.note&&o.note.trim()) || (o.added&&o.added.length);
    if(!hasData) return;
    const added = (o.added||[]).map(a=>[a.name,a.title,a.email].filter(Boolean).join(' | ')).join(' ; ');
    rows.push([c.name, c.booth||'', c.category, (o.note||'').trim(), added]);
  });
  if(rows.length===1){ toast('Nothing logged yet'); return; }
  const csv = rows.map(r=>r.map(v=>{
    v=(v==null?'':String(v)); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }).join(',')).join('\r\n');
  download('iste2026_salesforce_export.csv', csv, 'text/csv');
  toast('Salesforce CSV downloaded ('+(rows.length-1)+' rows)');
};
document.getElementById('importBtn').onclick = ()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{ try{
      const data = JSON.parse(r.result);
      Object.keys(data).forEach(k=>{ overrides[k] = Object.assign(ov(k), data[k]); });
      save(); render(); toast('Notes restored');
    }catch(err){ toast('Couldn\'t read that file'); } };
  r.readAsText(file); e.target.value='';
};

render();
if(!storageOK){ const s=document.getElementById('saveState'); if(s){ s.textContent='Preview only — saving is off here'; s.className='off'; } }
updateBackupState();
</script>
